<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

<body>
    <div>
        <pre>
            Create an arrow function that checks whether a given number is even or odd.
        </pre>
    </div>
</body>
<script>
    const evenOrOdd = (num) => {
        if (num%2==0) {
            return `${num} is even`
        } else {
            return `${num} is odd`
        }
    }
    console.log(evenOrOdd(12))
    console.log(evenOrOdd(13))

</script>
</html>
