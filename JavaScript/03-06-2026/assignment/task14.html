<body>
    <div>
        <pre>
            Create an arrow function that accepts multiple numbers using Rest Parameters and returns the largest number.
        </pre>
    </div>
</body>
<script>
    const findLargest = (...nums) => {
        let largest = nums[0];
        for (let i=1;i<nums.length;i++) {
            if (nums[i]>largest) {
                largest = nums[i]
            }
        }
        return largest
    }

    console.log(`largest number is ${findLargest(35,27,14,89,14)}`)
</script>
