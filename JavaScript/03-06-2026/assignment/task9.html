<body>
    <div>
        <pre>
            Create an arrow function that accepts a temperature in Celsius and converts it to Fahrenheit.
        </pre>
    </div>
</body>
<script>
    const toFahrenheit = (deg) => {
        return (deg*9/5)+32
    }

    const temperature = toFahrenheit(38)
    console.log(temperature+"F")
</script>
