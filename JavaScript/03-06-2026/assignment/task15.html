    <div>
        <pre>
            Create an arrow function that accepts multiple numbers using Rest Parameters and returns the smallest number.
        </pre>
    </div>
</body>
<script>
    const findSmallest = (...nums) => {
        let smallest = nums[0];
        for (let i=1;i<nums.length;i++) {
            if (nums[i]<smallest) {
                smallest = nums[i]
            }
        }
        return smallest
    }

    console.log(`smallest number is ${findSmallest(35,27,14,89,14)}`)
</script>
