            Create an arrow function that accepts a person's age and returns whether they are eligible for voting.
        </pre>

<script>

    const toVote = (age) => {
        return (age>=18 ? "can vote" : "cannot vote")
    }
    console.log("age is 15 ",toVote(15))
    console.log("age is 27 ",toVote(27))

</script>
