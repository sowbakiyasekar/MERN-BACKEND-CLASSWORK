    <div>
        <pre>   
            Create an arrow function that accepts three numbers and returns the largest number.
        </pre>
    </div>
</body>
<script>
    const checkLargest = (a,b,c) => {
        if(a>=b && a>=c) {
            return a
        } else if (b>=c && b>=a) {
            return b
        } else {
            return c
        }
    }

    const largest = checkLargest(20,10,28)
    console.log("Largest number is - ",largest)
</script>
