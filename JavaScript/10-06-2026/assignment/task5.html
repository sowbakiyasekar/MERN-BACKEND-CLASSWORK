Task
Convert the callback function into a Promise and display the result using .then().
    </pre>
</body>
<script>
    const orderFood=()=> {
        return new Promise((resolve) => {
            setTimeout(() => {resolve("Pizza Delivered")}, 4000)
        })
    }

    orderFood().then((result) => {
        console.log(result)
    })
</script>
