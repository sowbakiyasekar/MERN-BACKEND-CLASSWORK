Task
Convert the callback into a Promise.

Expected:

getEmployee()

.then(...)
    </pre>
</body>
<script>
    const getEmployee= ()=> {
        return new Promise((resolve) => {
            setTimeout(() => {
            resolve({
                id: 1,
                name: "Sudhan",
                role: "Trainer",
            });
            }, 3000);
        });
    }

    getEmployee().then((employee) => {
        console.log(employee);
    });
</script>
