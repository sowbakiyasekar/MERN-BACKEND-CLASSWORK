<!DOCTYPE html>
<html lang="en">

    <meta charset="UTF-8">

<body>
    <div>
        <pre>
            Task 7 - Callback Injection - Payment Gateway

                Create a function:

                processPayment(callback)
                Create separate callbacks for:

                GPay

                PhonePe

                Paytm

                Inject each callback dynamically.
        </pre>
    </div>
</body>
<script>
    const processPayment = (callback) => {
        console.log("Payment process initiated")
        callback()
    }

    const GPay = () => {
        console.log("Make your payment through gpay app")
    }
    const PhonePe = () => {
        console.log("Make your payment through phonepe")
    }
    const Paytm = () => {
        console.log("Payment link sent to paytm")
    }

    processPayment(GPay)
    processPayment(Paytm)
    processPayment(PhonePe)
</script>
</html>
