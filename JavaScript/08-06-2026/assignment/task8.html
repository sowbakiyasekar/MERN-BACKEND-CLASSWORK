<!DOCTYPE html>
<html lang="en">

<body>
   <div>
Given a student object containing multiple properties, extract all values 
into separate variables using Object Destructuring and display them.
   </div> 
</body>
<script>
    const student = {
        id: 1,
        name: "Sowbakiya",
        age: 29,
        course: "MERN",
        city: "Chennai"
    }

    const { id, name, age, course, city } = student
    console.log(id)
    console.log(name)
    console.log(age)
    console.log(course)
    console.log(city)
</script>
</html>
