<body>
    <pre>
Create a user dashboard system that safely accesses nested properties such as profile, address, 
and city using Optional Chaining and displays a default value using Nullish Coalescing when data is unavailable.
    </pre>
</body>
<script>
    const user = {
        profile: {
            address: {
            city: "Chennai"
            }
        }
    }

    const userCity = user?.profile?.address?.city ?? "City Not Available"

    console.log(userCity)
</script>
