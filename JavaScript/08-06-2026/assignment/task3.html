<body>
    <div>
        Create an Arrow Function that accepts a product price and discount percentage and returns the final discounted price.
    </div>
</body>
<script>
    const priceTag = (price, discount) => {
        const discountAmt = price * discount/100
        return price - discountAmt
    }
    const originalPrice = 1000
    const percentDiscount = 12
    console.log(`Original price- ${originalPrice}
discount percentage - ${percentDiscount} %
final price- ${priceTag(originalPrice,percentDiscount)}`)
</script>
