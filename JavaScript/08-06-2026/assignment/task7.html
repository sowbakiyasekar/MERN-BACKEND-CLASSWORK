<!DOCTYPE html>

<body>
    <div>
Create a copy of an employee object and add new properties such as department,
 experience, and salary without modifying the original object.
    </div>
</body>
<script>
    const employee = {
        id: 1,
        name: "Sowbakiya",
        role: "Developer"
    }

    const updatedEmployee = {
        ...employee,
        department: "MERN",
        experience: 2,
        salary: 50000
    }
    console.log(employee)
    console.log(updatedEmployee)

</script>
</html>
